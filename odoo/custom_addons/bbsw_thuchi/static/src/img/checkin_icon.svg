<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background rounded square -->
  <rect width="192" height="192" rx="40" fill="#16a34a"/>
  <!-- Inner glow -->
  <rect width="192" height="192" rx="40" fill="url(#grad)" opacity="0.3"/>
  <defs>
    <radialGradient id="grad" cx="40%" cy="30%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Clock circle -->
  <circle cx="96" cy="88" r="52" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
  <!-- Clock hands -->
  <line x1="96" y1="88" x2="96" y2="56" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
  <line x1="96" y1="88" x2="118" y2="104" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="96" cy="88" r="5" fill="#fff"/>
  <!-- Checkmark badge bottom-right -->
  <circle cx="148" cy="148" r="28" fill="#fff"/>
  <polyline points="135,148 144,158 162,138" fill="none" stroke="#16a34a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
