<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <defs>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f0fe"/>
      <stop offset="100%" stop-color="#f0f4ff"/>
    </linearGradient>
    <linearGradient id="laptopGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8d8f8"/>
      <stop offset="100%" stop-color="#a0b8e8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.2)"/>
    </filter>
    <filter id="coinShadow">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>

  <!-- Background waves -->
  <ellipse cx="200" cy="280" rx="220" ry="60" fill="rgba(255,255,255,0.08)"/>
  <ellipse cx="200" cy="300" rx="180" ry="40" fill="rgba(255,255,255,0.05)"/>

  <!-- Laptop base/stand -->
  <ellipse cx="200" cy="268" rx="130" ry="10" fill="rgba(0,0,0,0.15)"/>
  <rect x="155" y="255" width="90" height="8" rx="2" fill="#8aa8d8"/>
  <rect x="130" y="261" width="140" height="6" rx="3" fill="#7090c0"/>

  <!-- Laptop body -->
  <rect x="60" y="90" width="280" height="170" rx="10" fill="url(#laptopGrad)" filter="url(#shadow)"/>
  <rect x="68" y="98" width="264" height="154" rx="6" fill="url(#screenGrad)"/>

  <!-- Screen content -->
  <!-- Title bar -->
  <rect x="74" y="104" width="252" height="18" rx="3" fill="#dae3f8"/>
  <circle cx="84" cy="113" r="4" fill="#ff6b6b"/>
  <circle cx="96" cy="113" r="4" fill="#ffd93d"/>
  <circle cx="108" cy="113" r="4" fill="#6bcb77"/>

  <!-- Chart area -->
  <!-- Bar chart bars -->
  <rect x="82"  y="200" width="22" height="44" rx="3" fill="#f97316" opacity="0.9"/>
  <rect x="110" y="175" width="22" height="69" rx="3" fill="#1a56b0" opacity="0.9"/>
  <rect x="138" y="188" width="22" height="56" rx="3" fill="#f97316" opacity="0.8"/>
  <rect x="166" y="162" width="22" height="82" rx="3" fill="#1a56b0" opacity="0.9"/>
  <rect x="194" y="180" width="22" height="64" rx="3" fill="#f97316" opacity="0.85"/>
  <rect x="222" y="150" width="22" height="94" rx="3" fill="#1a56b0" opacity="0.9"/>
  <rect x="250" y="168" width="22" height="76" rx="3" fill="#f97316" opacity="0.8"/>
  <rect x="278" y="145" width="22" height="99" rx="3" fill="#1a56b0" opacity="0.85"/>

  <!-- Trend line -->
  <polyline points="93,195 121,172 149,184 177,158 205,172 233,145 261,162 289,140"
            fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
            stroke-dasharray="0"/>
  <!-- Trend line dots -->
  <circle cx="93"  cy="195" r="3.5" fill="#10b981"/>
  <circle cx="121" cy="172" r="3.5" fill="#10b981"/>
  <circle cx="149" cy="184" r="3.5" fill="#10b981"/>
  <circle cx="177" cy="158" r="3.5" fill="#10b981"/>
  <circle cx="205" cy="172" r="3.5" fill="#10b981"/>
  <circle cx="233" cy="145" r="3.5" fill="#10b981" stroke="#fff" stroke-width="2"/>
  <circle cx="261" cy="162" r="3.5" fill="#10b981"/>
  <circle cx="289" cy="140" r="3.5" fill="#10b981" stroke="#fff" stroke-width="2"/>

  <!-- X axis line -->
  <line x1="74" y1="244" x2="320" y2="244" stroke="#c8d4f0" stroke-width="1"/>

  <!-- Mini KPI top right on screen -->
  <rect x="216" y="106" width="112" height="36" rx="5" fill="#fff" opacity="0.85"/>
  <text x="226" y="119" font-family="Arial,sans-serif" font-size="8" fill="#64748b">Tổng thu tháng này</text>
  <text x="226" y="133" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#1a56b0">25,400,000 ₫</text>

  <!-- FLOATING ELEMENTS -->

  <!-- Coin 1 (large, left) -->
  <g filter="url(#coinShadow)" transform="translate(22,175)">
    <circle r="24" fill="#f59e0b"/>
    <circle r="19" fill="#fbbf24"/>
    <circle r="14" fill="#f59e0b" opacity="0.6"/>
    <text text-anchor="middle" dy="5" font-size="16" font-weight="bold" fill="#92400e">$</text>
  </g>

  <!-- Coin 2 (medium, right) -->
  <g filter="url(#coinShadow)" transform="translate(358,155)">
    <circle r="18" fill="#f59e0b"/>
    <circle r="14" fill="#fbbf24"/>
    <text text-anchor="middle" dy="4" font-size="12" font-weight="bold" fill="#92400e">$</text>
  </g>

  <!-- Coin 3 (small, bottom left) -->
  <g filter="url(#coinShadow)" transform="translate(50,248)">
    <circle r="13" fill="#f59e0b"/>
    <circle r="10" fill="#fbbf24"/>
    <text text-anchor="middle" dy="4" font-size="9" font-weight="bold" fill="#92400e">$</text>
  </g>

  <!-- Coin 4 (small, bottom right) -->
  <g filter="url(#coinShadow)" transform="translate(340,240)">
    <circle r="11" fill="#f59e0b"/>
    <circle r="8" fill="#fbbf24"/>
    <text text-anchor="middle" dy="3" font-size="8" font-weight="bold" fill="#92400e">$</text>
  </g>

  <!-- Arrow up (top right) -->
  <g transform="translate(370,70)" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="0" y1="30" x2="0" y2="0"/>
    <polyline points="-7,12 0,0 7,12" fill="none"/>
  </g>

  <!-- Pie chart (top right area) -->
  <g transform="translate(350,110)">
    <circle r="22" fill="none" stroke="#f97316" stroke-width="8"
            stroke-dasharray="35 104" stroke-dashoffset="0"
            transform="rotate(-90)"/>
    <circle r="22" fill="none" stroke="#1a56b0" stroke-width="8"
            stroke-dasharray="42 97" stroke-dashoffset="-35"
            transform="rotate(-90)"/>
    <circle r="22" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="8"
            stroke-dasharray="62 77" stroke-dashoffset="-77"
            transform="rotate(-90)"/>
  </g>

  <!-- Gear icon (top left) -->
  <g transform="translate(32,100)" opacity="0.7">
    <circle r="14" fill="none" stroke="white" stroke-width="2"/>
    <circle r="7"  fill="rgba(255,255,255,0.3)"/>
    <!-- gear teeth -->
    <rect x="-2" y="-16" width="4" height="6" rx="1" fill="white" transform="rotate(0)"/>
    <rect x="-2" y="-16" width="4" height="6" rx="1" fill="white" transform="rotate(45)"/>
    <rect x="-2" y="-16" width="4" height="6" rx="1" fill="white" transform="rotate(90)"/>
    <rect x="-2" y="-16" width="4" height="6" rx="1" fill="white" transform="rotate(135)"/>
    <rect x="-2" y="-16" width="4" height="6" rx="1" fill="white" transform="rotate(180)"/>
    <rect x="-2" y="-16" width="4" height="6" rx="1" fill="white" transform="rotate(225)"/>
    <rect x="-2" y="-16" width="4" height="6" rx="1" fill="white" transform="rotate(270)"/>
    <rect x="-2" y="-16" width="4" height="6" rx="1" fill="white" transform="rotate(315)"/>
  </g>

  <!-- Paper money -->
  <g transform="translate(290,230) rotate(-15)" opacity="0.85">
    <rect x="0" y="0" width="55" height="28" rx="4" fill="#4ade80"/>
    <rect x="4" y="4" width="47" height="20" rx="2" fill="#86efac"/>
    <text x="27" y="17" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">100</text>
  </g>

  <!-- Sparkle dots -->
  <circle cx="350" cy="55"  r="3" fill="white" opacity="0.7"/>
  <circle cx="360" cy="45"  r="2" fill="white" opacity="0.5"/>
  <circle cx="40"  cy="55"  r="3" fill="white" opacity="0.6"/>
  <circle cx="30"  cy="65"  r="2" fill="white" opacity="0.4"/>
  <circle cx="200" cy="55"  r="2.5" fill="white" opacity="0.5"/>
</svg>
