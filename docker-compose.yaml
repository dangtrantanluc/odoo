services:

  # ──────────────────────────────────────────────
  # Database
  # ──────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: project_management_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-project_management}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - pm_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-project_management}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Redis
  # ──────────────────────────────────────────────
  redis:
    image: redis:7.0-alpine
    container_name: project_management_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123@}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - pm_network
  # ──────────────────────────────────────────────
  
  web:
    image: odoo:17.0
    container_name: project_management_web
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
    volumes:
      - ./project_addons:/mnt/extra-addons
    environment:
      - HOST=db
      - USER=admin
      - PASSWORD=admin123
    command: >
      odoo
      -d bb_test_db
      --db_host db
      --db_user admin
      --db_password admin123
      --addons-path=/usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
    networks:
      - pm_network
      
  # ──────────────────────────────────────────────
  # AI Agent (FastAPI)
  # ──────────────────────────────────────────────
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    image: bb_pm_agent:latest
    container_name: project_management_agent
    restart: always
    volumes:
      - ./.env:/.env:ro
    ports:
      - "8001:8001"
    environment:
      - REDIS_HOST=redis
      - DB_HOST=db
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - MINIO_BUCKET=${MINIO_BUCKET:-file-storage}
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - pm_network

